<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template: repeat(3,100px)/repeat(4,1fr);
            border: 1px solid black;


        }
        
        .caixa1{
            border: 1px solid black;
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 1;
            grid-column-end: 5;
            background-color: rgba(170, 53, 170, 0.767);
        }
        
        .caixa2{
            border: 1px solid black;
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 3;
            background-color: aqua;

        }
        .caixa3{
            border: 1px solid black;
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 3;
            grid-column-end: 5;
            background-color: rgba(231, 241, 81, 0.801);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="caixa1">caixa1</div>
        <div class="caixa2">caixa2</div>
        <div class="caixa3">caixa3</div>
    </div>
</body>
</html>
